<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💖 for my girlfriend 💖</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #fce4ec 0%, #f8d7e0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      margin: 0;
    }
    .card {
      background: rgba(255, 250, 252, 0.8);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 56px 56px 56px 56px;
      box-shadow: 0 20px 40px rgba(190, 80, 120, 0.25), 0 8px 20px rgba(0,0,0,0.08);
      padding: 2rem 1.8rem 2.2rem;
      max-width: 540px;
      width: 100%;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 220, 230, 0.5);
      text-align: center;
    }
    h1, h2 {
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #5e2e3f;
    }
    h1 {
      font-size: 2.4rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    h2 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      color: #752e4a;
    }
    .subhead {
      font-size: 1.1rem;
      color: #7f4a5e;
      background: rgba(255, 225, 235, 0.6);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 2rem;
      backdrop-filter: blur(2px);
    }
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin: 2rem 0 1rem;
      position: relative;
      min-height: 80px;
    }
    .btn {
      border: none;
      background: white;
      padding: 0.9rem 2.5rem;
      border-radius: 120px;
      font-size: 1.6rem;
      font-weight: 600;
      box-shadow: 0 6px 0 #b38b9b, 0 8px 20px rgba(150, 60, 90, 0.2);
      cursor: pointer;
      transition: all 0.08s linear;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #381f2a;
      border: 1px solid #fadbe7;
      min-width: 120px;
      touch-action: manipulation;
    }
    .btn:active {
      transform: scale(0.94);
      box-shadow: 0 2px 0 #b38b9b;
    }
    .btn-yes {
      background: #fcd5e2;
      border-color: #e9b6ca;
      color: #3e1f2b;
      box-shadow: 0 6px 0 #b27c90, 0 8px 20px rgba(190, 80, 120, 0.3);
    }
    .btn-yes:hover {
      background: #fecfdf;
    }
    .btn-no {
      background: #e6d3d9;
      border-color: #d5bcc4;
      color: #3f2a32;
      box-shadow: 0 6px 0 #a58a94;
      position: relative;
      transition: all 0.08s ease;
      touch-action: none;
    }
    .btn-no:active {
      transform: scale(0.94);
      box-shadow: 0 2px 0 #a58a94;
    }
    .btn-no-move {
      transition: all 0.08s ease !important;
    }
    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.3);
      transform: scale(0.96);
    }
    .page {
      display: block;
      animation: fadePage 0.3s ease;
    }
    .page.hidden {
      display: none;
    }
    @keyframes fadePage {
      0% { opacity: 0.4; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .input-group {
      margin: 1.8rem 0 1.2rem;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-weight: 500;
      color: #4d2f3b;
      margin-bottom: 0.3rem;
      font-size: 1rem;
      letter-spacing: 0.3px;
      padding-left: 4px;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 48px;
      border: 1px solid #eacad7;
      background: rgba(255, 242, 247, 0.7);
      backdrop-filter: blur(4px);
      font-size: 1.1rem;
      color: #2c1b22;
      font-weight: 500;
      outline: none;
      transition: 0.2s;
    }
    .input-group input:focus, .input-group select:focus {
      border-color: #c28ea7;
      box-shadow: 0 0 0 4px rgba(200, 120, 150, 0.2);
      background: white;
    }
    .btn-next {
      background: #c58aa3;
      border: none;
      color: white;
      padding: 0.9rem 2.8rem;
      border-radius: 80px;
      font-weight: 600;
      font-size: 1.3rem;
      box-shadow: 0 6px 0 #7b5267;
      width: 100%;
      margin: 1rem 0 0.2rem;
      transition: 0.08s linear;
      cursor: pointer;
      border: 1px solid #ddb3c8;
      letter-spacing: 0.5px;
    }
    .btn-next:active {
      transform: scale(0.96);
      box-shadow: 0 2px 0 #7b5267;
    }
    .btn-next:disabled {
      opacity: 0.5;
      transform: scale(0.96);
      box-shadow: 0 4px 0 #7b5267;
      pointer-events: none;
    }
    .food-options {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
      margin: 1.2rem 0 1.8rem;
    }
    .food-card {
      background: white;
      border-radius: 60px;
      padding: 0.6rem 1.8rem;
      border: 2px solid #f2d7e2;
      font-size: 1.2rem;
      font-weight: 500;
      color: #3b2330;
      cursor: pointer;
      transition: 0.1s ease;
      box-shadow: 0 4px 0 #cdb2bf;
      flex: 1 0 auto;
      min-width: 80px;
    }
    .food-card.selected {
      background: #fccfdf;
      border-color: #b8718f;
      box-shadow: 0 4px 0 #a06a83;
      transform: scale(1.02);
    }
    .food-card:active {
      transform: scale(0.92);
      box-shadow: 0 1px 0 #cdb2bf;
    }
    .food-card input[type="radio"] {
      display: none;
    }
    .date-time-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .heart-icon {
      color: #c54b75;
      font-size: 2.2rem;
      line-height: 1;
    }
    .footer-message {
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: #8f6379;
      background: rgba(255, 220, 235, 0.3);
      border-radius: 60px;
      padding: 0.4rem 0.8rem;
      display: inline-block;
    }
    .btn-back {
      background: transparent;
      border: none;
      color: #886174;
      font-size: 0.9rem;
      text-decoration: underline;
      cursor: pointer;
      margin-top: 0.8rem;
      padding: 0.2rem 1rem;
    }
    .emoji-big {
      font-size: 2rem;
    }
    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 1rem;
      border-radius: 12px;
      margin-top: 1rem;
      border: 2px solid #c3e6cb;
    }
    @media (max-width: 480px) {
      .card { padding: 1.5rem 1rem; }
      h1 { font-size: 2rem; }
      .btn { font-size: 1.3rem; padding: 0.7rem 1.8rem; min-width: 90px; }
    }
  </style>
</head>
<body>
<div class="card" id="app">
  <!-- PAGE 1: yes/no -->
  <div id="page1" class="page">
    <h1>
      <span class="heart-icon">💗</span> 
      <span>you & me</span>
    </h1>
    <div class="subhead">✨ one special date ✨</div>
    <div style="font-size: 1.6rem; margin-bottom: 0.4rem;">do you want to date with me?</div>
    <div class="btn-group" id="yesNoGroup">
      <button class="btn btn-yes" id="yesBtn">yes 💖</button>
      <button class="btn btn-no btn-no-move" id="noBtn">no 💔</button>
    </div>
    <div class="footer-message">❤️ click yes (no really, yes) ❤️</div>
  </div>

  <!-- PAGE 2: date & time -->
  <div id="page2" class="page hidden">
    <h2>📅 pick a moment</h2>
    <div class="date-time-group">
      <div class="input-group">
        <label for="datePicker">📆 date</label>
        <input type="date" id="datePicker" min="2026-06-18" value="2026-06-20">
      </div>
      <div class="input-group">
        <label for="timePicker">⏰ time</label>
        <input type="time" id="timePicker" value="19:00">
      </div>
    </div>
    <button class="btn-next" id="toFoodBtn">next → food</button>
    <button class="btn-back" id="backToPage1">← back</button>
  </div>

  <!-- PAGE 3: food preference with EMAIL FORM -->
  <div id="page3" class="page hidden">
    <h2>🍽️ what do you crave?</h2>
    <div style="margin: 0.8rem 0 0.2rem; font-size: 1.1rem; color: #5e3346;">pick your favourite</div>
    <div class="food-options" id="foodOptions">
      <label class="food-card" data-value="italian">
        <input type="radio" name="food" value="italian"> 🇮🇹 Italian
      </label>
      <label class="food-card" data-value="japanese">
        <input type="radio" name="food" value="japanese"> 🍣 Japanese
      </label>
      <label class="food-card" data-value="mexican">
        <input type="radio" name="food" value="mexican"> 🌮 Mexican
      </label>
      <label class="food-card" data-value="indian">
        <input type="radio" name="food" value="indian"> 🍛 Indian
      </label>
      <label class="food-card" data-value="dessert">
        <input type="radio" name="food" value="dessert"> 🍰 dessert
      </label>
    </div>
    
    <!-- ⭐ FORMSPREE FORM - Replace YOUR_FORM_ID below ⭐ -->
    <form id="responseForm" action="https://formspree.io/f/xlgkvyoj" method="POST">
      <input type="hidden" name="date" id="formDate">
      <input type="hidden" name="time" id="formTime">
      <input type="hidden" name="food" id="formFood">
      <input type="hidden" name="_subject" value="💖 She said YES! Date Details 💖">
      <input type="hidden" name="_replyto" value="your-email@gmail.com">
      <button type="submit" class="btn-next" id="submitBtn">💌 Send to my love 💌</button>
    </form>
    
    <button class="btn-back" id="backToPage2">← back</button>
    <div style="margin-top: 1rem; font-size: 0.95rem; color: #7b4f62;" id="summaryMessage"></div>
  </div>

  <!-- message area -->
  <div id="finalMessage" style="margin-top: 1.5rem; font-size: 1.2rem; font-weight: 500; color: #b24a6d; min-height: 2.5rem;"></div>
</div>

<script>
  (function() {
    // ----- DOM refs -----
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const page3 = document.getElementById('page3');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const toFoodBtn = document.getElementById('toFoodBtn');
    const backToPage1 = document.getElementById('backToPage1');
    const backToPage2 = document.getElementById('backToPage2');
    const submitBtn = document.getElementById('submitBtn');
    const datePicker = document.getElementById('datePicker');
    const timePicker = document.getElementById('timePicker');
    const foodOptions = document.getElementById('foodOptions');
    const summaryMsg = document.getElementById('summaryMessage');
    const finalMsgDiv = document.getElementById('finalMessage');
    const form = document.getElementById('responseForm');

    // state
    let selectedFood = null;
    let noClickCount = 0;

    // ---------- helper: show page ----------
    function showPage(pageId) {
      [page1, page2, page3].forEach(p => p.classList.add('hidden'));
      if (pageId === 'page1') page1.classList.remove('hidden');
      else if (pageId === 'page2') page2.classList.remove('hidden');
      else if (pageId === 'page3') page3.classList.remove('hidden');
      finalMsgDiv.textContent = '';
      summaryMsg.textContent = '';
    }

    // ---------- moving "no" button ----------
    function moveNoButton() {
      const group = document.getElementById('yesNoGroup');
      if (!group) return;
      const groupW = group.offsetWidth;
      const groupH = group.offsetHeight;
      const noW = noBtn.offsetWidth;
      const noH = noBtn.offsetHeight;
      
      const maxX = Math.max(10, groupW - noW - 10);
      const maxY = Math.max(10, groupH - noH - 10);
      let x = Math.floor(Math.random() * maxX);
      let y = Math.floor(Math.random() * maxY);
      
      noBtn.style.position = 'relative';
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
      noBtn.style.transform = 'none';
      noBtn.style.transition = 'left 0.08s, top 0.08s, transform 0.08s';
    }

    function resetNoButton() {
      noBtn.style.position = 'static';
      noBtn.style.left = 'auto';
      noBtn.style.top = 'auto';
      noBtn.style.transform = 'none';
      noBtn.style.transition = 'none';
    }

    // ---------- no button click ----------
    noBtn.addEventListener('click', function(e) {
      e.preventDefault();
      noClickCount++;
      moveNoButton();
      finalMsgDiv.textContent = '😜 nope! click yes, love 💕';
      setTimeout(() => {
        if (page1.classList.contains('hidden') === false) {
          finalMsgDiv.textContent = '💋 just click yes...';
        }
      }, 700);
      if (noClickCount > 5) {
        setTimeout(() => {
          resetNoButton();
          finalMsgDiv.textContent = '✨ ok ok, but yes is the only way ✨';
          setTimeout(() => {
            if (page1.classList.contains('hidden') === false) {
              finalMsgDiv.textContent = '💖 yes?';
            }
          }, 800);
        }, 300);
      }
    });

    // ---------- yes button ----------
    yesBtn.addEventListener('click', function() {
      resetNoButton();
      showPage('page2');
      finalMsgDiv.textContent = '💗 great choice! pick a date 💗';
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const year = tomorrow.getFullYear();
      const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
      const day = String(tomorrow.getDate()).padStart(2, '0');
      datePicker.value = `${year}-${month}-${day}`;
      if (!timePicker.value) timePicker.value = '19:00';
    });

    // ---------- back buttons ----------
    backToPage1.addEventListener('click', function() {
      showPage('page1');
      resetNoButton();
      finalMsgDiv.textContent = '💕 come back to yes 💕';
    });

    backToPage2.addEventListener('click', function() {
      showPage('page2');
      finalMsgDiv.textContent = '⏰ adjust date & time';
    });

    // ---------- to food page ----------
    toFoodBtn.addEventListener('click', function() {
      const dateVal = datePicker.value;
      const timeVal = timePicker.value;
      if (!dateVal || !timeVal) {
        finalMsgDiv.textContent = '📌 please pick both date and time!';
        return;
      }
      showPage('page3');
      finalMsgDiv.textContent = '🍜 choose your favourite food!';
      summaryMsg.textContent = `📅 ${dateVal} at ${timeVal}`;
      selectedFood = null;
      document.querySelectorAll('.food-card').forEach(c => c.classList.remove('selected'));
      document.querySelectorAll('input[name="food"]').forEach(i => i.checked = false);
    });

    // ---------- food selection ----------
    foodOptions.addEventListener('change', function(e) {
      if (e.target && e.target.matches('input[name="food"]')) {
        document.querySelectorAll('.food-card').forEach(c => c.classList.remove('selected'));
        const parent = e.target.closest('.food-card');
        if (parent) parent.classList.add('selected');
        selectedFood = e.target.value;
        finalMsgDiv.textContent = `🍽️ you picked ${selectedFood}! lovely.`;
      }
    });

    document.querySelectorAll('.food-card').forEach(card => {
      card.addEventListener('click', function(e) {
        const radio = this.querySelector('input[type="radio"]');
        if (radio) {
          radio.checked = true;
          const ev = new Event('change', { bubbles: true });
          radio.dispatchEvent(ev);
        }
      });
    });

    // ---------- FORM SUBMISSION - Send email with her choices ----------
    form.addEventListener('submit', function(e) {
      const dateVal = datePicker.value;
      const timeVal = timePicker.value;
      
      if (!selectedFood) {
        e.preventDefault();
        finalMsgDiv.textContent = '😋 please select a food!';
        return;
      }
      
      if (!dateVal || !timeVal) {
        e.preventDefault();
        finalMsgDiv.textContent = '📌 missing date or time!';
        return;
      }
      
      // Update hidden form fields with her choices
      document.getElementById('formDate').value = dateVal;
      document.getElementById('formTime').value = timeVal;
      document.getElementById('formFood').value = selectedFood;
      
      // Show sending message
      finalMsgDiv.innerHTML = '💕 Sending your choices to me...';
      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ Sending...';
    });

    // ---------- set default date ----------
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    const year = tomorrow.getFullYear();
    const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
    const day = String(tomorrow.getDate()).padStart(2, '0');
    datePicker.value = `${year}-${month}-${day}`;
    if (!timePicker.value) timePicker.value = '19:00';

    resetNoButton();
  })();
</script>
</body>
</html>
